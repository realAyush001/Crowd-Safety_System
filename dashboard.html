<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Safety Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E14;
    --panel: #121826;
    --panel-2: #161D2C;
    --border: #1E2635;
    --teal: #2DD4BF;
    --teal-dim: #164E4A;
    --red: #EF4444;
    --amber: #F59E0B;
    --green: #22C55E;
    --text: #E6EAF0;
    --muted: #8B95A5;
    --muted-2: #5A6478;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(45,212,191,0.06), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(239,68,68,0.05), transparent 40%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    transition: box-shadow 0.4s ease;
  }

  body.alert-active {
    animation: vignette-pulse 1.4s ease-in-out infinite;
  }

  @keyframes vignette-pulse {
    0%, 100% { box-shadow: inset 0 0 0px rgba(239,68,68,0); }
    50% { box-shadow: inset 0 0 140px rgba(239,68,68,0.35); }
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(18,24,38,0.6);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 0 0 rgba(45,212,191,0.6);
    animation: dot-ping 2s infinite;
  }
  @keyframes dot-ping {
    0% { box-shadow: 0 0 0 0 rgba(45,212,191,0.55); }
    70% { box-shadow: 0 0 0 9px rgba(45,212,191,0); }
    100% { box-shadow: 0 0 0 0 rgba(45,212,191,0); }
  }

  .brand h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    margin: 0;
    text-transform: uppercase;
  }
  .brand .sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  #clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--teal);
    letter-spacing: 0.05em;
  }

  .layout {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 18px;
    padding: 20px 28px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* --- Radar Map --- */
  #map-wrap { position: relative; }
  #radar-svg { width: 100%; height: 480px; display: block; }

  .grid-line { stroke: rgba(148,163,184,0.08); stroke-width: 1; }
  .sweep-circle { stroke: rgba(45,212,191,0.12); fill: none; stroke-width: 1; }

  .adj-line { stroke: rgba(148,163,184,0.18); stroke-width: 1.5; fill: none; transition: stroke 0.4s, stroke-width 0.4s; }
  .adj-line.risky { stroke: var(--amber); stroke-width: 2.5; stroke-dasharray: 4 3; animation: dash-move 1s linear infinite; }

  @keyframes dash-move { to { stroke-dashoffset: -14; } }

  .node-pulse { animation: node-breathe 2.4s ease-in-out infinite; }
  @keyframes node-breathe { 0%,100% { r: var(--base-r); opacity: 0.35; } 50% { r: calc(var(--base-r) + 8px); opacity: 0; } }

  .node-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .node-count { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }

  /* --- Zone cards --- */
  #zone-list { max-height: 480px; overflow-y: auto; }
  .zone-card {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .zone-top { display: flex; justify-content: space-between; align-items: baseline; }
  .zone-name { font-size: 14px; font-weight: 600; }
  .zone-id { color: var(--muted-2); font-size: 11px; }

  .risk-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .risk-Safe { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .risk-Caution { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
  .risk-Danger { background: rgba(239,68,68,0.14); color: var(--red); border: 1px solid rgba(239,68,68,0.4); }

  .bar-track { height: 6px; border-radius: 4px; background: var(--panel-2); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease, background 0.5s ease; }

  .zone-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); display: flex; gap: 14px; }
  .zone-warning { font-size: 11.5px; color: var(--amber); }
  .zone-safe-route { font-size: 11.5px; color: var(--green); }

  /* --- Event log ticker --- */
  #log-panel { grid-column: 1 / -1; }
  #log-body {
    height: 150px;
    overflow-y: auto;
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    display: flex;
    flex-direction: column-reverse;
  }
  .log-line { padding: 3px 0; border-bottom: 1px dashed rgba(148,163,184,0.06); color: var(--muted); }
  .log-line .ts { color: var(--muted-2); margin-right: 10px; }
  .log-line.sev-Danger { color: var(--red); }
  .log-line.sev-Caution { color: var(--amber); }
  .log-line.sev-Safe { color: var(--teal); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="live-dot"></span>
    <div>
      <h1>Crowd Safety // Control Room</h1>
      <div class="sub">Predictive density monitoring &middot; Live feed</div>
    </div>
  </div>
  <div id="clock" class="mono">--:--:--</div>
</header>

<div class="layout">

  <div class="panel" id="map-wrap">
    <div class="panel-head"><span>Zone Radar Map</span><span id="zone-count-label">-- ZONES TRACKED</span></div>
    <svg id="radar-svg" viewBox="0 0 600 480"></svg>
  </div>

  <div class="panel">
    <div class="panel-head"><span>Zone Status</span><span id="last-update">awaiting data</span></div>
    <div id="zone-list"></div>
  </div>

  <div class="panel" id="log-panel">
    <div class="panel-head"><span>Incident Log</span><span>live event stream</span></div>
    <div id="log-body"></div>
  </div>

</div>

<script>
const API_BASE = "http://localhost:8080";
const WS_URL = "ws://localhost:8080/dashboard/live";

// Known adjacency (mirrors the Redis-seeded neighbor data) — used to draw map lines
const ADJACENCY = [["A","B"], ["A","C"], ["B","D"]];

const zones = {};
let audioCtx = null;

function clockTick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
}
setInterval(clockTick, 1000);
clockTick();

function riskColor(risk) {
  if (risk === "Danger") return "#EF4444";
  if (risk === "Caution") return "#F59E0B";
  return "#22C55E";
}

function logEvent(text, sev) {
  const body = document.getElementById('log-body');
  const line = document.createElement('div');
  line.className = 'log-line sev-' + (sev || 'Safe');
  const ts = new Date().toLocaleTimeString('en-IN', { hour12: false });
  line.innerHTML = `<span class="ts">${ts}</span>${text}`;
  body.prepend(line);
  while (body.children.length > 60) body.removeChild(body.lastChild);
}

function playAlertTone() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [0, 0.3].forEach((offset, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(i % 2 === 0 ? 880 : 660, now + offset);
      gain.gain.setValueAtTime(0.0001, now + offset);
      gain.gain.exponentialRampToValueAtTime(0.15, now + offset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.3);
    });
  } catch (e) { /* audio not available until user interacts with page once */ }
}

function refreshAlertState() {
  const anyDanger = Object.values(zones).some(z => z.risk_level === "Danger");
  document.body.classList.toggle('alert-active', anyDanger);
}

// ---------- Radar map ----------
function computeProjection() {
  const lats = Object.values(zones).map(z => parseFloat(z.lat)).filter(v => !isNaN(v));
  const lngs = Object.values(zones).map(z => parseFloat(z.lng)).filter(v => !isNaN(v));
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const pad = 90;
  return function(lat, lng) {
    const x = pad + ((lng - minLng) / ((maxLng - minLng) || 1)) * (600 - pad * 2);
    const y = (480 - pad) - ((lat - minLat) / ((maxLat - minLat) || 1)) * (480 - pad * 2);
    return [x, y];
  };
}

function renderMap() {
  const svg = document.getElementById('radar-svg');
  svg.innerHTML = "";
  const ns = "http://www.w3.org/2000/svg";
  const project = computeProjection();

  // background grid
  for (let x = 0; x <= 600; x += 40) {
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', x); l.setAttribute('y1', 0); l.setAttribute('x2', x); l.setAttribute('y2', 480);
    l.setAttribute('class', 'grid-line');
    svg.appendChild(l);
  }
  for (let y = 0; y <= 480; y += 40) {
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', 0); l.setAttribute('y1', y); l.setAttribute('x2', 600); l.setAttribute('y2', y);
    l.setAttribute('class', 'grid-line');
    svg.appendChild(l);
  }
  // sweep circles from center
  [70, 140, 210].forEach(r => {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', 300); c.setAttribute('cy', 240); c.setAttribute('r', r);
    c.setAttribute('class', 'sweep-circle');
    svg.appendChild(c);
  });

  const positions = {};
  Object.keys(zones).forEach(id => {
    const z = zones[id];
    if (z.lat && z.lng) positions[id] = project(parseFloat(z.lat), parseFloat(z.lng));
  });

  // adjacency lines
  ADJACENCY.forEach(([a, b]) => {
    if (!positions[a] || !positions[b]) return;
    const line = document.createElementNS(ns, 'line');
    const [x1, y1] = positions[a], [x2, y2] = positions[b];
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    const risky = [zones[a]?.risk_level, zones[b]?.risk_level].some(r => r === 'Danger' || r === 'Caution');
    line.setAttribute('class', 'adj-line' + (risky ? ' risky' : ''));
    svg.appendChild(line);
  });

  // nodes
  Object.keys(positions).forEach(id => {
    const [x, y] = positions[id];
    const z = zones[id];
    const color = riskColor(z.risk_level);
    const count = parseInt(z.current_count || 0);
    const capacity = parseInt(z.capacity || 1);
    const fillRatio = Math.min(count / capacity, 1);
    const baseR = 14 + fillRatio * 16;

    if (z.risk_level === 'Danger') {
      const pulse = document.createElementNS(ns, 'circle');
      pulse.setAttribute('cx', x); pulse.setAttribute('cy', y);
      pulse.style.setProperty('--base-r', baseR + 'px');
      pulse.setAttribute('r', baseR);
      pulse.setAttribute('fill', color);
      pulse.setAttribute('class', 'node-pulse');
      svg.appendChild(pulse);
    }

    const node = document.createElementNS(ns, 'circle');
    node.setAttribute('cx', x); node.setAttribute('cy', y); node.setAttribute('r', baseR);
    node.setAttribute('fill', color + '33');
    node.setAttribute('stroke', color);
    node.setAttribute('stroke-width', 2);
    svg.appendChild(node);

    const countText = document.createElementNS(ns, 'text');
    countText.setAttribute('x', x); countText.setAttribute('y', y + 4);
    countText.setAttribute('text-anchor', 'middle');
    countText.setAttribute('class', 'node-count');
    countText.setAttribute('fill', color);
    countText.textContent = count;
    svg.appendChild(countText);

    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', x); label.setAttribute('y', y + baseR + 16);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', 'node-label');
    label.textContent = z.name || id;
    svg.appendChild(label);
  });

  document.getElementById('zone-count-label').textContent = Object.keys(zones).length + " ZONES TRACKED";
}

// ---------- Zone list ----------
function renderList() {
  const list = document.getElementById('zone-list');
  list.innerHTML = "";
  Object.keys(zones).sort().forEach(id => {
    const z = zones[id];
    const count = parseInt(z.current_count || 0);
    const capacity = parseInt(z.capacity || 1);
    const pct = Math.min((count / capacity) * 100, 100);
    const color = riskColor(z.risk_level);

    const card = document.createElement('div');
    card.className = 'zone-card';
    card.innerHTML = `
      <div class="zone-top">
        <div><span class="zone-name">${z.name || id}</span> <span class="zone-id mono">ZONE ${id}</span></div>
        <span class="risk-pill risk-${z.risk_level || 'Safe'}">${z.risk_level || 'Safe'}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>
      <div class="zone-meta">
        <span>${count} / ${capacity} PPL</span>
        ${z.eta_danger && z.eta_danger > 0 ? `<span>ETA ${z.eta_danger} MIN</span>` : ''}
      </div>
      ${z.cascade_warning ? `<div class="zone-warning">&#9888; ${z.cascade_warning}</div>` : ''}
      ${z.nearest_safe_zone ? `<div class="zone-safe-route">&#10003; Nearest safe zone: ${z.nearest_safe_zone.replace('zone:','')}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

function renderAll() {
  renderMap();
  renderList();
  refreshAlertState();
}

// ---------- Data loading ----------
fetch(API_BASE + "/zones")
  .then(res => res.json())
  .then(data => {
    (data || []).forEach(z => { zones[z.zone_id] = z; });
    renderAll();
    logEvent("System initialized — " + (data || []).length + " zones loaded", "Safe");
  })
  .catch(() => logEvent("Could not reach API at " + API_BASE + " — is the Go server running?", "Danger"));

const ws = new WebSocket(WS_URL);
ws.onopen = () => logEvent("Live feed connected", "Safe");
ws.onclose = () => logEvent("Live feed disconnected", "Caution");
ws.onmessage = (event) => {
  const update = JSON.parse(event.data);
  const prevRisk = zones[update.zone_id]?.risk_level;
  zones[update.zone_id] = { ...zones[update.zone_id], ...update };

  document.getElementById('last-update').textContent = "updated " + new Date().toLocaleTimeString('en-IN', { hour12: false });

  const zoneName = zones[update.zone_id]?.name || update.zone_id;
  logEvent(`ZONE ${update.zone_id} (${zoneName}) &rarr; ${update.risk_level.toUpperCase()} &middot; ${update.current_count} ppl`, update.risk_level);

  if (update.risk_level === "Danger" && prevRisk !== "Danger") {
    playAlertTone();
    logEvent(`ALERT: Zone ${update.zone_id} crossed danger threshold`, "Danger");
  }
  if (update.cascade_warning) {
    logEvent(`CASCADE RISK from zone ${update.zone_id}: ${update.cascade_warning}`, "Caution");
  }

  renderAll();
};
</script>
</body>
</html>
